<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORVEX OS</title>
    <style>
        /* Fond texturé */
        body { 
            margin: 0; 
            background-color: #050505; 
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 30px 30px; 
            color: #fff; 
            font-family: 'Courier New', monospace; 
        }

        /* Splash Screen */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
        #logo-splash { width: 300px; margin-bottom: 30px; }
        #bar { width: 0%; height: 6px; background: #ff0000; animation: loading 6s forwards; }
        @keyframes loading { to { width: 100%; } }

        /* Header */
        #header { display: flex; align-items: center; background: #111; padding: 15px; border-bottom: 2px solid #ff0000; }
        .logo-header { width: 40px; margin-right: 15px; }
        .title-header { font-weight: bold; letter-spacing: 3px; font-size: 18px; }

        /* Contenu */
        #main { display: none; padding: 20px; }
        .btn-mili { 
            display: flex; align-items: center; background: #0d0d0d; border: 1px solid #333; 
            padding: 15px; margin: 15px 0; cursor: pointer; transition: 0.3s;
            border-left: 5px solid #ff0000;
        }
        .btn-mili:hover { background: #1a1a1a; }
        .logo-btn { width: 50px; margin-right: 20px; }

        /* Footer */
        footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 10px; color: #444; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="logo.png" id="logo-splash" alt="Logo">
        <div style="width: 250px; background: #222;"><div id="bar"></div></div>
    </div>

    <div id="main">
        <header id="header">
            <img src="logo.png" class="logo-header" alt="Logo">
            <div class="title-header">RÉSEAUX KORVEX</div>
        </header>

        <!-- Bouton LABS avec logo dédié -->
        <div class="btn-mili" onclick="alert('Accès LABS...')">
            <img src="KORVEX LABS.png" class="logo-btn" alt="Labs">
            <div>
                <div style="font-size: 16px; font-weight: bold;">KORVEX LABS</div>
                <div style="font-size: 10px; color: #888;">SECTION RECHERCHE & DÉVELOPPEMENT</div>
            </div>
        </div>

        <!-- Bouton P9 -->
        <div class="btn-mili" onclick="alert('Accès P9...')">
            <img src="logo.png" class="logo-btn" alt="P9">
            <div>
                <div style="font-size: 16px; font-weight: bold;">PROTOCOLE P9</div>
                <div style="font-size: 10px; color: #888;">ARCHIVES DU TOME 1</div>
            </div>
        </div>

        <footer>© 2026 KORVEX - SYSTÈME DÉPLIÉ</footer>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(function() {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            }, 500);
        }, 6000);
    </script>
</body>
</html>
