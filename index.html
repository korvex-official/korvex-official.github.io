<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORVEX SYSTEM</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; }

        /* Splash */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:999; }
        #logo-splash { width: 300px; margin-bottom: 30px; animation: pulse 2s infinite; }
        #bar-bg { width: 250px; height: 2px; background: #111; }
        #bar { width: 0%; height: 100%; background: #ff0000; animation: loading 6s forwards; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes loading { to { width: 100%; } }

        /* Header Fixe - Aligné gauche */
        .header-box { border-bottom: 1px solid #222; padding: 25px 20px; display: flex; align-items: center; justify-content: flex-start; gap: 25px; }
        .logo-header { width: 50px; }
        .title-header { font-size: 22px; letter-spacing: 6px; color: #fff; text-transform: uppercase; border-left: 2px solid #ff0000; padding-left: 20px; }

        /* Boutons avec effet relief */
        .btn-zone { width: 90%; max-width: 600px; margin: 30px auto; padding: 20px; background: #0a0a0a; border: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-zone:hover { border-color: #ff0000; background: #111; box-shadow: 0 0 10px rgba(255,0,0,0.1); }
        .btn-zone img { width: 45px; margin-right: 25px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        .btn-zone span { font-size: 15px; letter-spacing: 2px; color: #eee; }

        footer { text-align: center; color: #333; font-size: 10px; margin-top: 80px; }

        /* Mobile Fix */
        @media (max-width: 600px) {
            .header-box { padding: 20px 15px; }
            .title-header { font-size: 14px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div id="splash">
        <img src="logo.png" id="logo-splash">
        <div id="bar-bg"><div id="bar"></div></div>
    </div>

    <div id="home">
        <div class="header-box">
            <img src="logo.png" class="logo-header">
            <div class="title-header">RÉSEAUX KORVEX</div>
        </div>
        <div class="btn-zone" onclick="showLabs()">
            <img src="KORVEX LABS.png"> <span>KORVEX LABS</span>
        </div>
    </div>

    <div id="labs" style="display:none;">
        <div class="header-box">
            <img src="logo.png" class="logo-header">
            <div class="title-header">KORVEX LABS</div>
        </div>
        <div class="btn-zone" onclick="alert('Ouverture P9...')">
            <img src="p9-icon.png"> <span>PROTOCOLE P9</span>
        </div>
        <div class="btn-zone" onclick="window.open('https://discord.gg/ton-lien')">
            <img src="discord-icon.png"> <span>DISCORD</span>
        </div>
        <div class="btn-zone" onclick="backToHome()" style="border:none; background:transparent; justify-content:center;">
            <span style="color: #ff0000; text-decoration: underline;">RETOUR AU MENU</span>
        </div>
    </div>

    <footer>© 2026 KORVEX - SYSTÈME DÉPLIÉ</footer>

    <script>
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 500); }, 6000);
        function showLabs() { document.getElementById('home').style.display = 'none'; document.getElementById('labs').style.display = 'block'; }
        function backToHome() { document.getElementById('labs').style.display = 'none'; document.getElementById('home').style.display = 'block'; }
    </script>
</body>
</html>
