<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORVEX SYSTEM</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; }

        /* Splash Screen */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
        #logo-splash { width: 300px; margin-bottom: 30px; animation: pulse 2s infinite; }
        #bar-bg { width: 250px; height: 6px; background: #222; margin-bottom: 10px; }
        #bar { width: 0%; height: 100%; background: #ff0000; animation: loading 6s forwards; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes loading { to { width: 100%; } }

        /* Header Central */
        #header-container { display: flex; align-items: center; justify-content: center; padding: 40px 20px; border-bottom: 1px solid #333; }
        .logo-main { width: 120px; margin-right: 30px; }
        .title-main { font-size: 32px; font-weight: bold; text-transform: uppercase; border: 2px solid #ff0000; padding: 15px 30px; letter-spacing: 5px; }

        /* Boutons type "Dalle Militaire" */
        .btn-zone { display: block; width: 90%; max-width: 500px; margin: 30px auto; padding: 20px; background: #111; border: 1px solid #444; text-align: left; cursor: pointer; transition: 0.3s; }
        .btn-zone:hover { border-color: #ff0000; background: #1a1a1a; }
        .btn-zone img { width: 50px; vertical-align: middle; margin-right: 20px; }
        .btn-zone span { font-size: 18px; font-weight: bold; }

        /* Footer */
        footer { position: fixed; bottom: 20px; width: 100%; text-align: center; color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="logo.png" id="logo-splash" alt="Logo">
        <div id="bar-bg"><div id="bar"></div></div>
    </div>

    <div id="home">
        <div id="header-container">
            <img src="logo.png" class="logo-main">
            <div class="title-main">RÉSEAUX KORVEX</div>
        </div>

        <div class="btn-zone" onclick="showLabs()">
            <img src="KORVEX LABS.png"> <span>KORVEX LABS</span>
        </div>
    </div>

    <div id="labs" style="display:none;">
        <div id="header-container">
            <img src="logo.png" class="logo-main">
            <div class="title-main">KORVEX LABS</div>
        </div>

        <div class="btn-zone" onclick="alert('Ouverture P9...')">
            <img src="logo.png"> <span>PROTOCOLE P9</span>
        </div>
        <div class="btn-zone" onclick="window.open('https://discord.gg/ton-lien')">
            <img src="logo.png"> <span>DISCORD</span>
        </div>
        
        <div class="btn-zone" onclick="backToHome()" style="border-color:#555; text-align:center;">
            <span>← RETOUR AU MENU</span>
        </div>
    </div>

    <footer>© 2026 KORVEX - SYSTÈME DÉPLIÉ</footer>

    <script>
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 500); }, 6000);
        function showLabs() { document.getElementById('home').style.display = 'none'; document.getElementById('labs').style.display = 'block'; }
        function backToHome() { document.getElementById('labs').style.display = 'none'; document.getElementById('home').style.display = 'block'; }
    </script>
</body>
</html>
