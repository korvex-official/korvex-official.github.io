<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORVEX SYSTEM</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; text-align: center; }

        /* Splash Screen */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
        
        #logo-splash { width: 300px; margin-bottom: 30px; }
        
        #load-container { width: 250px; height: 6px; background: #222; margin-bottom: 10px; }
        /* Barre en ROUGE */
        #bar { width: 0%; height: 100%; background: #ff0000; animation: loading 6s forwards; }

        /* Texte sous la barre */
        #status-text { color: #ff0000; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }

        @keyframes loading { to { width: 100%; } }

        /* Main Content */
        #main { display: none; padding-top: 50px; }
        .logo-main { width: 120px; margin-bottom: 30px; }
        button { display: block; margin: 15px auto; padding: 15px; width: 80%; background: #111; color: #fff; border: 1px solid #444; font-family: monospace; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="logo.png" id="logo-splash" alt="Logo">
        <div id="load-container"><div id="bar"></div></div>
        <div id="status-text">INITIALISATION DU PROTOCOLE KORVEX...</div>
    </div>

    <div id="main">
        <img src="logo.png" class="logo-main" alt="Logo">
        <button onclick="alert('Accès aux archives...')">🧩 KORVEX LABS</button>
        <button onclick="alert('Chargement du P9...')">📖 PROTOCOLE P9</button>
        <button onclick="window.open('https://discord.gg/ton-lien')">💬 DISCORD</button>
    </div>

    <script>
        // Le script attend 6 secondes
        setTimeout(function() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(function() {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            }, 500);
        }, 6000);
    </script>
</body>
</html>
