<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORVEX SYSTEM</title>
    <style>
        /* Fond "Scanner" sombre */
        body { margin: 0; background: #050505; color: #fff; font-family: 'Courier New', monospace; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 0, 0, 0.03)); background-size: 100% 4px, 3px 100%; pointer-events: none; }

        /* Splash Screen */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
        #logo-splash { width: 300px; margin-bottom: 30px; animation: pulse 2s infinite; }
        #bar-bg { width: 250px; height: 6px; background: #222; margin-bottom: 10px; }
        #bar { width: 0%; height: 100%; background: #ff0000; animation: loading 6s forwards; }
        #status-text { color: #ff0000; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes loading { to { width: 100%; } }

        /* Header */
        #header { border: 1px solid #333; padding: 15px; margin: 15px; text-align: center; background: #111; }
        .logo-header { width: 80px; float: left; }
        .title-header { display: inline-block; padding: 10px; border: 1px solid #ff0000; letter-spacing: 4px; font-weight: bold; margin-top: 10px; }

        /* Boutons */
        .btn-mili { display: flex; align-items: center; background: #0d0d0d; border: 1px solid #333; padding: 15px; margin: 20px; cursor: pointer; border-left: 5px solid #ff0000; }
        .logo-btn { width: 60px; margin-right: 20px; }

        footer { text-align: center; font-size: 10px; color: #444; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="logo.png" id="logo-splash" alt="Logo">
        <div id="bar-bg"><div id="bar"></div></div>
        <div id="status-text">INITIALISATION PROTOCOLE KORVEX...</div>
    </div>

    <!-- PAGE ACCUEIL -->
    <div id="home">
        <header id="header">
            <img src="logo.png" class="logo-header" alt="Logo">
            <div class="title-header">RÉSEAUX KORVEX</div>
        </header>

        <div class="btn-mili" onclick="showLabs()">
            <img src="KORVEX LABS.png" class="logo-btn" alt="Labs">
            <div>
                <div style="font-size: 16px; font-weight: bold;">KORVEX LABS</div>
                <div style="font-size: 10px; color: #888;">UNIVERS DAYZ & DÉVELOPPEMENT</div>
            </div>
        </div>
    </div>

    <!-- SECTION LABS -->
    <div id="labs" style="display:none;">
        <header id="header">
            <div class="title-header" onclick="location.reload()" style="cursor:pointer;">← RETOUR</div>
        </header>

        <div class="btn-mili" onclick="alert('Ouverture P9...')">
            <img src="logo.png" class="logo-btn">
            <div>
                <div style="font-size: 16px; font-weight: bold;">PROTOCOLE P9</div>
                <div style="font-size: 10px; color: #888;">ARCHIVES, TOMES & FICHES PERSO</div>
            </div>
        </div>

        <div class="btn-mili" onclick="window.open('https://discord.gg/ton-lien')">
            <img src="logo.png" class="logo-btn">
            <div>
                <div style="font-size: 16px; font-weight: bold;">DISCORD</div>
                <div style="font-size: 10px; color: #888;">CANAL DE COMMUNICATION</div>
            </div>
        </div>
    </div>

    <footer>© 2026 KORVEX - SYSTÈME DÉPLIÉ</footer>

    <script>
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 500); }, 6000);
        function showLabs() { document.getElementById('home').style.display = 'none'; document.getElementById('labs').style.display = 'block'; }
    </script>
</body>
</html>
"
